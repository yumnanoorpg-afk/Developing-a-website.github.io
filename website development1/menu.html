<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>Kombu Menu</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="menu-page">

<!-- SEARCH -->
<section class="search-section">
  <input type="text" placeholder="Search food..." class="search-bar">
</section>

<!-- CATEGORIES -->
<section class="category-grid">
  <div class="category">Burgers</div>
  <div class="category">Pizza</div>
  <div class="category">Pasta</div>
  <div class="category">Drinks</div>
  <div class="category">Desserts</div>
  <div class="category">Sides</div>
</section>

<!-- FOOD GRID -->
<section class="food-grid">

  <div class="food-card">
    <img src="images/burger.jpg" alt="">
    <h3>Classic Burger</h3>
    <p>£5.99</p>
  </div>

  <div class="food-card">
    <img src="images/pizza.jpg" alt="">
    <h3>Cheese Pizza</h3>
    <p>£7.99</p>
  </div>

  <div class="food-card">
    <img src="images/pasta.jpg" alt="">
    <h3>Cream Pasta</h3>
    <p>£6.99</p>
  </div>

  <div class="food-card">
    <img src="images/drink.jpg" alt="">
    <h3>Soft Drink</h3>
    <p>£1.99</p>
  </div>

</section>

<!-- NAVBAR -->
<header class="navbar">

  <ul class="nav-links">

    <li class="dropdown">

      <input type="checkbox" id="menu-toggle">

      <label for="menu-toggle">
        <img src="images/dropdown.png" alt="Menu" class="dropdown-icon">
      </label>

      <ul class="dropdown-menu">
        <li><a href="page one.html#home">Home</a></li>
        <li><a href="page one.html#about">About Us</a></li>
        <li><a href="menu.html">Menu</a></li>
        <li><a href="basket.html">Basket</a></li>
      </ul>

    </li>

  </ul>

  <div class="right-icons">
    <a href="basket.html">
      <img src="images/basket.png" alt="Basket" class="basket-icon">
    </a>
  </div>

</header>

</body>
</html>
